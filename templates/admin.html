<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Agenda & Logbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 22px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            color: white;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-primary { background: #3498db; }
        .btn-success { background: #27ae60; }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #f39c12; }
        .btn-outline { background: transparent; border: 2px solid white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-purple { background: #8e44ad; }

        .section { background: white; border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .section h2 { font-size: 18px; margin-bottom: 15px; color: #2c3e50; }

        .form-agenda { display: flex; gap: 15px; flex-wrap: wrap; align-items: end; }
        .form-agenda .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
        .form-agenda label { font-size: 12px; font-weight: 600; color: #2c3e50; }
        .form-agenda input, .form-agenda textarea { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 13px; }
        .form-agenda textarea { resize: vertical; min-height: 60px; }

        .agenda-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .agenda-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #3498db;
            position: relative;
        }
        .agenda-card.completed { border-left-color: #27ae60; background: #e8f5e9; }
        .agenda-card .judul { font-weight: 700; color: #2c3e50; }
        .agenda-card .tgl { font-size: 12px; color: #7f8c8d; }
        .agenda-card .aksi { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .agenda-card .badge-status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge-active { background: #3498db; color: white; }
        .badge-completed { background: #27ae60; color: white; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th {
            background: #34495e;
            color: white;
            padding: 10px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }
        table td { padding: 8px 10px; border-bottom: 1px solid #ecf0f1; }
        table tr:hover { background: #f8f9fa; }

        .badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-hadir { background: #d4edda; color: #155724; }
        .badge-izin { background: #fff3cd; color: #856404; }
        .badge-sakit { background: #f8d7da; color: #721c24; }
        .badge-dinas { background: #cce5ff; color: #004085; }

        .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .no-data { text-align: center; padding: 30px; color: #7f8c8d; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 550px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-content h2 { margin-bottom: 20px; color: #2c3e50; font-size: 20px; }
        .modal-content .form-group { margin-bottom: 14px; }
        .modal-content label { display: block; font-weight: 600; font-size: 13px; color: #2c3e50; margin-bottom: 4px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        .modal-content textarea { resize: vertical; min-height: 60px; }
        .modal-content .btn-group-modal { display: flex; gap: 10px; margin-top: 20px; }
        .modal-content .btn-group-modal .btn { flex: 1; text-align: center; }
        .foto-modal-content { max-width: 500px; text-align: center; }
        .foto-modal-content img { max-width: 100%; max-height: 70vh; border-radius: 10px; margin: 10px 0; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .header-actions { justify-content: center; }
            .form-agenda { flex-direction: column; }
            .form-agenda .form-group { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Admin - Agenda & Logbook</h1>
            <div class="header-actions">
                <a href="/" class="btn btn-outline">🏠 Ke Absen</a>
                <a href="/logout" class="btn btn-outline">🚪 Logout</a>
            </div>
        </div>

        <!-- Form Buat Agenda -->
        <div class="section">
            <h2>📅 Buat Agenda Harian</h2>
            <form id="formAgenda" class="form-agenda" onsubmit="buatAgenda(event)">
                <div class="form-group">
                    <label>📌 Judul Agenda</label>
                    <input type="text" id="judulAgenda" placeholder="Contoh: Belajar Matematika" required>
                </div>
                <div class="form-group">
                    <label>📝 Deskripsi</label>
                    <textarea id="deskripsiAgenda" placeholder="Detail kegiatan..."></textarea>
                </div>
                <div class="form-group">
                    <label>📅 Tanggal</label>
                    <input type="date" id="tanggalAgenda" required>
                </div>
                <div class="form-group" style="justify-content: end;">
                    <button type="submit" class="btn btn-primary">➕ Buat Agenda</button>
                </div>
            </form>
        </div>

        <!-- Daftar Agenda -->
        <div class="section">
            <h2>📋 Daftar Agenda</h2>
            <div id="agendaList" class="agenda-list">
                <div class="no-data">⏳ Memuat agenda...</div>
            </div>
        </div>

        <!-- Logbook / Data Absen per Agenda -->
        <div class="section" id="logbookSection">
            <h2>📖 Logbook Harian</h2>
            <div id="logbookContainer">
                <div class="no-data">Pilih agenda di atas untuk melihat logbook</div>
            </div>
        </div>
    </div>

    <!-- Modal Edit -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ Edit Data Absen</h2>
            <form id="editForm" onsubmit="updateData(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="editNama" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="editKategori">
                        <option value="Hadir">Hadir</option>
                        <option value="Izin">Izin</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Dinas">Dinas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <textarea id="editKeterangan" placeholder="Keterangan..."></textarea>
                </div>
                <div class="btn-group-modal">
                    <button type="submit" class="btn btn-success">💾 Simpan</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('editModal')">❌ Batal</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Foto -->
    <div class="modal" id="fotoModal">
        <div class="modal-content foto-modal-content">
            <h2>📷 Foto</h2>
            <img id="fotoPreview" src="" alt="Foto">
            <div class="btn-group-modal" style="margin-top:15px;">
                <button class="btn btn-primary" onclick="closeModal('fotoModal')">Tutup</button>
                <button class="btn btn-success" onclick="downloadFoto()">💾 Download</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let allAgenda = [];
        let currentFotoData = null;

        // ============ LOAD DATA ============
        function loadData() {
            fetch('/api/data/full')
                .then(res => res.json())
                .then(data => {
                    allData = data;
                    renderLogbook();
                })
                .catch(err => console.error(err));
        }

        function loadAgenda() {
            fetch('/api/agenda')
                .then(res => res.json())
                .then(data => {
                    allAgenda = data;
                    renderAgenda();
                })
                .catch(err => console.error(err));
        }

        // ============ RENDER AGENDA ============
        function renderAgenda() {
            const container = document.getElementById('agendaList');
            if (!allAgenda || allAgenda.length === 0) {
                container.innerHTML = '<div class="no-data">📭 Belum ada agenda</div>';
                return;
            }
            let html = '';
            allAgenda.forEach(a => {
                const isActive = a.status === 'active';
                html += `
                    <div class="agenda-card ${isActive ? '' : 'completed'}">
                        <div class="judul">${a.judul}</div>
                        <div class="tgl">📅 ${a.tanggal}</div>
                        <div style="font-size:12px;color:#555;margin:5px 0;">${a.deskripsi || '-'}</div>
                        <span class="badge-status ${isActive ? 'badge-active' : 'badge-completed'}">
                            ${isActive ? 'Aktif' : 'Selesai'}
                        </span>
                        <div class="aksi">
                            ${isActive ? `<button class="btn btn-success btn-sm" onclick="completeAgenda('${a.id}')">✅ Selesai</button>` : ''}
                            <button class="btn btn-primary btn-sm" onclick="lihatLogbook('${a.id}')">📖 Lihat Logbook</button>
                            <button class="btn btn-success btn-sm" onclick="exportPDF('${a.id}')">📄 PDF</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============ BUAT AGENDA ============
        function buatAgenda(e) {
            e.preventDefault();
            const judul = document.getElementById('judulAgenda').value.trim();
            const deskripsi = document.getElementById('deskripsiAgenda').value.trim();
            const tanggal = document.getElementById('tanggalAgenda').value;

            if (!judul || !tanggal) {
                alert('Judul dan tanggal wajib diisi!');
                return;
            }

            const formData = new FormData();
            formData.append('judul', judul);
            formData.append('deskripsi', deskripsi);
            formData.append('tanggal', tanggal);

            fetch('/api/agenda', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('✅ Agenda berhasil dibuat!');
                    document.getElementById('judulAgenda').value = '';
                    document.getElementById('deskripsiAgenda').value = '';
                    document.getElementById('tanggalAgenda').value = '';
                    loadAgenda();
                } else {
                    alert('❌ ' + data.message);
                }
            })
            .catch(err => alert('Gagal membuat agenda!'));
        }

        // ============ COMPLETE AGENDA ============
        function completeAgenda(id) {
            if (!confirm('Yakin agenda ini sudah selesai?')) return;
            fetch(`/api/agenda/complete/${id}`, { method: 'PUT' })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    loadAgenda();
                })
                .catch(err => alert('Gagal!'));
        }

        // ============ LIHAT LOGBOOK ============
        let currentAgendaId = null;

        function lihatLogbook(agendaId) {
            currentAgendaId = agendaId;
            const container = document.getElementById('logbookContainer');
            const filtered = allData.filter(d => d.agenda_id === agendaId);
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-data">📭 Belum ada data absen untuk agenda ini</div>';
                return;
            }
            let html = `
                <div style="margin-bottom:10px;font-size:14px;color:#2c3e50;">
                    <strong>Total: ${filtered.length} orang</strong>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Kategori</th>
                                <th>Keterangan</th>
                                <th>Jam</th>
                                <th>Foto</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            filtered.forEach((item, idx) => {
                const badgeClass = {
                    'Hadir': 'badge-hadir',
                    'Izin': 'badge-izin',
                    'Sakit': 'badge-sakit',
                    'Dinas': 'badge-dinas'
                }[item.kategori] || 'badge-hadir';
                let fotoHtml = '-';
                if (item.foto && item.foto.length > 100) {
                    fotoHtml = `<button class="btn btn-primary btn-sm" onclick="lihatFoto('${item.foto}')">📷</button>`;
                }
                html += `
                    <tr>
                        <td>${idx+1}</td>
                        <td><strong>${item.nama}</strong></td>
                        <td><span class="badge ${badgeClass}">${item.kategori}</span></td>
                        <td>${item.keterangan || '-'}</td>
                        <td>${item.jam}</td>
                        <td>${fotoHtml}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-warning btn-sm" onclick="openEdit('${item.id}')">✏️</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteData('${item.id}')">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // ============ RENDER LOGBOOK (otomatis tampilkan yang pertama) ============
        function renderLogbook() {
            if (allAgenda.length > 0 && !currentAgendaId) {
                // Tampilkan agenda aktif pertama
                const active = allAgenda.find(a => a.status === 'active');
                if (active) {
                    lihatLogbook(active.id);
                } else {
                    lihatLogbook(allAgenda[0].id);
                }
            } else if (currentAgendaId) {
                lihatLogbook(currentAgendaId);
            }
        }

        // ============ DELETE ============
        function deleteData(id) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            fetch(`/api/data/delete/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(() => {
                    loadData();
                    if (currentAgendaId) lihatLogbook(currentAgendaId);
                })
                .catch(err => alert('Gagal menghapus!'));
        }

        // ============ EDIT ============
        function openEdit(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('editNama').value = item.nama;
            document.getElementById('editKategori').value = item.kategori || 'Hadir';
            document.getElementById('editKeterangan').value = item.keterangan || '';
            document.getElementById('editModal').classList.add('active');
        }

        function updateData(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                nama: document.getElementById('editNama').value,
                kategori: document.getElementById('editKategori').value,
                keterangan: document.getElementById('editKeterangan').value
            };
            fetch(`/api/data/update/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(() => {
                closeModal('editModal');
                loadData();
                if (currentAgendaId) lihatLogbook(currentAgendaId);
                alert('✅ Data berhasil diupdate!');
            })
            .catch(err => alert('Gagal update!'));
        }

        // ============ FOTO ============
        function lihatFoto(fotoBase64) {
            if (!fotoBase64 || fotoBase64 === 'Ada Foto') {
                alert('❌ Data foto tidak lengkap!');
                return;
            }
            currentFotoData = fotoBase64;
            document.getElementById('fotoPreview').src = fotoBase64;
            document.getElementById('fotoModal').classList.add('active');
        }

        function downloadFoto() {
            if (!currentFotoData) return;
            const link = document.createElement('a');
            link.href = currentFotoData;
            link.download = `foto_${Date.now()}.jpg`;
            link.click();
        }

        // ============ EXPORT PDF ============
        function exportPDF(agendaId) {
            window.open(`/api/export/pdf/${agendaId}`, '_blank');
        }

        // ============ MODAL ============
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        window.onclick = function(event) {
            document.querySelectorAll('.modal').forEach(modal => {
                if (event.target === modal) modal.classList.remove('active');
            });
        }

        // ============ LOAD ============
        loadAgenda();
        loadData();

        // Set tanggal default ke hari ini
        document.getElementById('tanggalAgenda').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
